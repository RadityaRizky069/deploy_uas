<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Trashformer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
    <div class="auth-card fade-in">
        <div class="auth-logo">
            <i class="fas fa-user-plus"></i>
            <h1>Daftar Akun</h1>
            <p>Bergabung sebagai Warga</p>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}">Error</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form th:action="@{/register/save}" method="post" onsubmit="return validateForm()">
            <div class="mb-3">
                <label for="nama" class="form-label">Nama Lengkap</label>
                <input type="text" id="nama" name="nama" class="form-control" placeholder="Masukkan nama lengkap" required minlength="3">
            </div>
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Masukkan username" required minlength="3">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" class="form-control" placeholder="Buat password" required minlength="8" onkeyup="checkPassword()">
                    <button type="button" class="password-toggle" onclick="togglePassword('password', this)" tabindex="-1">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="strength-meter mt-2" id="strengthMeter">
                    <div class="strength-bar">
                        <div class="strength-bar-fill" id="strengthFill"></div>
                    </div>
                    <div class="strength-label" id="strengthLabel"></div>
                </div>
            </div>
            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Konfirmasi Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Ulangi password" required onkeyup="checkMatch()">
                    <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', this)" tabindex="-1">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <small id="matchMsg" class="form-text"></small>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-user-plus me-2"></i>Daftar
            </button>
        </form>

        <div class="auth-footer">
            Sudah punya akun? <a th:href="@{/login}">Login</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword(inputId, btn) {
            var input = document.getElementById(inputId);
            var icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function checkPassword() {
            var pw = document.getElementById('password').value;

            var score = 0;
            if (pw.length >= 8) score++;
            if (/[A-Z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;

            var fill = document.getElementById('strengthFill');
            var label = document.getElementById('strengthLabel');

            if (pw.length === 0) {
                fill.style.width = '0%';
                fill.className = 'strength-bar-fill';
                label.innerHTML = '';
                checkMatch();
                return;
            }

            var pct = (score / 3) * 100;
            fill.style.width = pct + '%';

            if (score === 1) {
                fill.className = 'strength-bar-fill weak';
                label.innerHTML = '<span class="text-danger fw-semibold"><i class="fas fa-shield-alt me-1"></i>Weak</span>';
            } else if (score === 2) {
                fill.className = 'strength-bar-fill medium';
                label.innerHTML = '<span class="text-warning fw-semibold"><i class="fas fa-shield-alt me-1"></i>Medium</span>';
            } else if (score === 3) {
                fill.className = 'strength-bar-fill strong';
                label.innerHTML = '<span class="text-success fw-semibold"><i class="fas fa-shield-alt me-1"></i>Strong</span>';
            } else {
                fill.className = 'strength-bar-fill';
                label.innerHTML = '<span class="text-muted fw-semibold"><i class="fas fa-shield-alt me-1"></i>Too weak</span>';
            }

            checkMatch();
        }

        function checkMatch() {
            var pw = document.getElementById('password').value;
            var cpw = document.getElementById('confirmPassword').value;
            var msg = document.getElementById('matchMsg');

            if (cpw.length === 0) {
                msg.innerHTML = '';
                return;
            }
            if (pw === cpw) {
                msg.innerHTML = '<span class="text-success"><i class="fas fa-check-circle"></i> Password cocok</span>';
            } else {
                msg.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle"></i> Password tidak cocok</span>';
            }
        }

        function showToast(msg, type) {
            type = type || 'primary';
            var toastEl = document.getElementById('toastNotif');
            if (!toastEl) return;
            var msgEl = document.getElementById('toastMsg');
            if (msgEl) msgEl.textContent = msg;
            toastEl.className = 'toast align-items-center border-0 bg-' + type + ' text-white';
            var toast = new bootstrap.Toast(toastEl, { delay: 4000 });
            toast.show();
        }

        function validateForm() {
            var pw = document.getElementById('password').value;
            var cpw = document.getElementById('confirmPassword').value;

            if (pw.length < 8) {
                showToast('Password minimal 8 karakter', 'danger');
                return false;
            }
            if (!/[A-Z]/.test(pw)) {
                showToast('Password harus mengandung huruf besar', 'danger');
                return false;
            }
            if (!/[0-9]/.test(pw)) {
                showToast('Password harus mengandung angka', 'danger');
                return false;
            }
            if (pw !== cpw) {
                showToast('Konfirmasi password tidak cocok', 'danger');
                return false;
            }
            return true;
        }
    </script>

    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999;">
        <div id="toastNotif" class="toast align-items-center border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastMsg"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>
</body>
</html>
