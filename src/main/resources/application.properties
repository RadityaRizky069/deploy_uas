spring.application.name=trashformer

# ========================
# Server
# ========================
server.port=${PORT:8080}

# ========================
# Database Configuration
# Lokal default: Laragon MySQL
# Render: pakai Environment Variables
# ========================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/trashformer_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# Connection Pool HikariCP
# ========================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========================
# Session
# ========================
server.servlet.session.timeout=30m
server.servlet.session.tracking-modes=cookie

# ========================
# File Upload Multipart
# ========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ========================
# Upload Directory
# Lokal default: uploads/bukti_pembayaran
# Render: pakai UPLOAD_DIR
# ========================
app.upload.dir=${UPLOAD_DIR:uploads/bukti_pembayaran}